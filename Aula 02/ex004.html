<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos Básicos JS</title>
    <style>
            body{
                background-color: rgb(38, 38, 251);
                color: whitesmoke;
                font: normal 20pt Arial;
            }
        </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var numero = Number(window.prompt('Digite um número'))
        var arredondamento = Number(window.prompt("Digite a quantidade de casas decimais"))
        var numeroArredondado = numero.toFixed(arredondamento)
        window.alert(`O número arredondado é : ${numeroArredondado}`)
    </script>
</body>
</html>
