<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos Básicos JS</title>
    <style>
            body{
                background-color: rgb(38, 38, 251);
                color: whitesmoke;
                font: normal 20pt Arial;
            }
        </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var numero = Number(window.prompt('Digite seu salário'))
        var arredondamento = Number(window.prompt("Digite a quantidade de casas decimais"))
        var salarioArredondado = Number(numero.toFixed(arredondamento))//toFixed retorna uma String e não um número

        var salario = salarioArredondado.toLocaleString('pt-BR', {style:'currency', currency: 'USD'})//toLocaleString funciona com Number e não com String

        window.alert(`O seu salário é : ${salario}`)
    </script>
</body>
</html>
