<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos no DOM</title>
    <!--Script conectando o html ao css-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculando com JS</h1>
    <form>
        <div>
            <input type="number" id="screen" value="0">
        </div>
        <div>
            <input type="number" id="enter">
        </div>
        <div>
            <input type="button" id="btnOne" value="1" onclick="add1()">
            <input type="button" id="btnTwo" value="2" onclick="add2()">
            <input type="button" id="btnThree" value="3" onclick="add3()">
            <input type="button" id="btnSum" value="+" onclick="sum()">
        </div>
        <div>
            <input type="button" id="btnFour" value="4" onclick="add4()">
            <input type="button" id="btnFive" value="5" onclick="add5()">
            <input type="button" id="btnSix" value="6" onclick="add6()">
            <input type="button" id="btnSubtract" value="-" onclick="subtract()">
        </div>
        <div>
            <input type="button" id="btnSeven" value="7" onclick="add7()">
            <input type="button" id="btnEight" value="8" onclick="add8()">
            <input type="button" id="btnNine" value="9" onclick="add9()">
            <input type="button" id="btnMultiply" value="×" onclick="multiply()">
        </div>
        <div>
            <input type="button" id="eraser" value="Eraser" onclick="Eraser()">
            <input type="button" id="btnZero" value="0" onclick="add0()">
            <input type="button" id="equals" value="=" onclick="equality()">
            <input type="button" id="btnDivide" value="÷" onclick="divide()">
        </div>
    </form>
    <div id = 'err'></div>
    <!--Script conected to JS from HTML-->
    <script src="script.js"></script>
</body>

</html>
