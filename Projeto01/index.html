<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos no DOM</title>
    <!--Script conectando o html ao css-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculando com JS</h1>
    <form>
        <div>
            <input type="number" id="tela">
        </div>
        <div>
            <input type="number" id="enter">
        </div>
        <div>
            <input type="button" id="one" value="1">
            <input type="button" id="two" value="2">
            <input type="button" id="three" value="3">
            <input type="button" id="sum" value="+" onclick="sum()">
        </div>
        <div>
            <input type="button" id="four" value="4">
            <input type="button" id="five" value="5">
            <input type="button" id="six" value="6">
            <input type="button" id="subtract" value="-" onclick="subtract()">
        </div>
        <div>
            <input type="button" id="seven" value="7">
            <input type="button" id="eight" value="8">
            <input type="button" id="nine" value="9">
            <input type="button" id="multiply" value="x" onclick="multiply()">
        </div>
        <div>
            <input type="button" id="zero" value="0">
            <input type="button" id="raiz" value="√">
            <input type="button" id="divide" value="÷">
            <input type="button" id="equals" value="=" onclick="equals()">
        </div>
    </form>
    <!--Script conectando o html ao JS-->
    <script src="script.js"></script>
</body>

</html>
